<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reading Championship</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
        }
        .card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .winner {
            background: gold;
            color: #2c3e50;
            font-weight: bold;
        }
        .title {
            font-size: 0.9em;
            color: #7f8c8d;
            margin-top: 5px;
        }
        #results {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>📚 Reading Championship</h1>
    <div id="results"></div>

    <script src="script.js"></script>
</body>
</html>
